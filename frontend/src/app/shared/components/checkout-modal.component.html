<div *ngIf="isOpen" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-2xl w-full max-w-md overflow-hidden shadow-2xl animate-fade-in-up">
    <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
      <h3 class="text-xl font-bold text-gray-800">Confirmar Pago</h3>
      <button (click)="closeEvent.emit()" class="text-gray-400 hover:text-red-500 transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>
    
    <div class="p-6 space-y-6">
      <div class="text-center p-4 bg-indigo-50 rounded-xl border border-indigo-100">
        <p class="text-sm text-indigo-600 font-semibold mb-1">Total a Cobrar</p>
        <p class="text-4xl font-black text-indigo-900">${{ total | number:'1.0-0' }}</p>
      </div>
      
      <div class="space-y-3">
        <p class="text-sm font-semibold text-gray-700">Método de Pago</p>
        <div class="grid grid-cols-3 gap-3">
          <button (click)="setPaymentMethod('Efectivo')" [class.bg-indigo-600]="paymentMethod() === 'Efectivo'" [class.text-white]="paymentMethod() === 'Efectivo'" [class.bg-gray-100]="paymentMethod() !== 'Efectivo'" [class.text-gray-600]="paymentMethod() !== 'Efectivo'" class="py-3 px-2 rounded-xl font-medium transition-all duration-200">Efectivo</button>
          <button (click)="setPaymentMethod('Nequi')" [class.bg-indigo-600]="paymentMethod() === 'Nequi'" [class.text-white]="paymentMethod() === 'Nequi'" [class.bg-gray-100]="paymentMethod() !== 'Nequi'" [class.text-gray-600]="paymentMethod() !== 'Nequi'" class="py-3 px-2 rounded-xl font-medium transition-all duration-200">Nequi</button>
          <button (click)="setPaymentMethod('Tarjeta')" [class.bg-indigo-600]="paymentMethod() === 'Tarjeta'" [class.text-white]="paymentMethod() === 'Tarjeta'" [class.bg-gray-100]="paymentMethod() !== 'Tarjeta'" [class.text-gray-600]="paymentMethod() !== 'Tarjeta'" class="py-3 px-2 rounded-xl font-medium transition-all duration-200">Tarjeta</button>
        </div>
      </div>
      
      <div class="flex gap-3 pt-2">
        <button (click)="closeEvent.emit()" class="flex-1 px-4 py-3 bg-gray-100 text-gray-700 font-semibold rounded-xl hover:bg-gray-200 transition-colors">Cancelar</button>
        <button (click)="onConfirm()" class="flex-1 px-4 py-3 bg-indigo-600 text-white font-semibold rounded-xl hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-200">Confirmar</button>
      </div>
    </div>
  </div>
</div>
