<div class="min-h-screen bg-slate-50 flex items-center justify-center p-4 font-sans">
  <div class="bg-white p-8 md:p-10 rounded-2xl shadow-sm border border-slate-200 w-full max-w-md text-center">
    
    <h1 class="text-3xl md:text-4xl font-bold text-slate-900 tracking-tight mb-8">
      Servex<span class="text-indigo-600">SaaS</span>
    </h1>

    <div class="flex flex-col gap-4 text-left">
      <div>
        <label class="block text-slate-600 font-medium mb-1 text-sm">Correo Electrónico</label>
        <input type="email" [value]="loginEmail()" (input)="updateLoginEmail($event)" 
          placeholder="usuario@domain.com" 
          class="w-full bg-white border border-slate-300 text-slate-900 rounded-lg p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
      </div>

      <div>
        <label class="block text-slate-600 font-medium mb-1 text-sm">PIN de Acceso</label>
        <input type="password" [value]="loginPin()" (input)="updateLoginPin($event)" 
          placeholder="••••" 
          class="w-full bg-white border border-slate-300 text-slate-900 rounded-lg p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" 
          (keyup.enter)="onLogin()">
      </div>

      @if (authService.loginError()) {
        <div class="bg-red-50 text-red-600 px-4 py-3 rounded-lg text-sm mb-4 border border-red-100 flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
          <span>{{ authService.loginError() }}</span>
        </div>
      }

      <button (click)="onLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-lg shadow-sm mt-2 transition-colors">
        Entrar al Sistema
      </button>
    </div>

    <div class="mt-8 pt-6 border-t border-slate-100 text-center">
      <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">
        Plataforma de Gestión de Restaurantes
      </p>
    </div>

  </div>
</div>
