<div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
  <div class="p-4 md:p-5 border-b border-slate-100 bg-white flex flex-col sm:flex-row justify-between sm:items-center gap-3">
    <h3 class="text-lg font-bold text-slate-800">Historial de Ventas Exitosas</h3>
    <select (change)="onChangeSalesPeriod($event)" class="bg-white border border-slate-200 text-slate-700 rounded-lg py-1.5 px-3 text-sm font-medium outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer shadow-sm w-full sm:w-auto">
      <option value="all" [selected]="salesPeriod() === 'all'">Todo el historial</option><option value="day" [selected]="salesPeriod() === 'day'">Hoy</option><option value="week" [selected]="salesPeriod() === 'week'">Esta Semana</option><option value="month" [selected]="salesPeriod() === 'month'">Este Mes</option>
    </select>
  </div>
  <div class="overflow-x-auto">
    <table class="w-full text-left min-w-[700px]"><thead class="bg-slate-50 border-b border-slate-200 text-slate-500 uppercase text-xs font-semibold tracking-wider"><tr><th class="p-4">Orden #</th><th class="p-4">Hora</th><th class="p-4 text-center">Estado</th><th class="p-4 text-center">Productos</th><th class="p-4">Pago</th><th class="p-4 text-right">Total</th></tr></thead><tbody class="divide-y divide-slate-100">@for (sale of validSales(); track sale.id) { <tr class="hover:bg-slate-50/50 transition-colors"><td class="p-4 font-black text-slate-900">#{{ sale.orderNumber }}</td><td class="p-4 text-sm text-slate-600">{{ sale.createdAt | date:'short' }}</td><td class="p-4 text-center"><span [class]="sale.status === 'Pendiente' ? 'bg-indigo-50 text-indigo-600 border-indigo-200' : 'bg-emerald-50 text-emerald-600 border-emerald-200'" class="px-2 py-1 rounded text-[10px] font-bold border uppercase tracking-wider">{{ sale.status || 'Entregado' }}</span></td><td class="p-4 text-center"><span class="bg-slate-100 text-slate-600 px-2 py-1 rounded text-xs font-medium">{{ sale.items?.length || 0 }} items</span></td><td class="p-4 text-sm text-slate-600"><span class="border border-slate-200 bg-white px-2 py-1 rounded text-xs font-semibold">{{ sale.paymentMethod }}</span></td><td class="p-4 text-right font-black text-slate-900">${{ sale.total | number }}</td></tr> }</tbody></table>
  </div>
</div>
