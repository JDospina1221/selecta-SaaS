<div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
  <div class="p-4 md:p-5 border-b border-slate-100 flex flex-col sm:flex-row justify-between sm:items-center gap-4 bg-white">
    <div><h3 class="text-lg font-bold text-slate-800">Caja Menor Operativa</h3></div>
    <button (click)="openExpenseModal()" class="bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 font-medium py-2 px-4 rounded-lg text-sm transition-colors flex items-center justify-center gap-1.5 w-full sm:w-auto"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg> Registrar Gasto</button>
  </div>
  <div class="overflow-x-auto">
    <table class="w-full text-left min-w-[600px]"><thead class="bg-slate-50 border-b border-slate-200 text-slate-500 text-xs font-semibold uppercase tracking-wider"><tr><th class="p-4">Fecha</th><th class="p-4">Descripción</th><th class="p-4 text-center">Categoría</th><th class="p-4 text-right">Monto</th></tr></thead><tbody class="divide-y divide-slate-100">@for (expense of adminExpenses(); track expense.id) { <tr class="hover:bg-red-50/50 transition-colors"><td class="p-4 text-sm text-slate-600">{{ expense.createdAt | date:'short' }}</td><td class="p-4 font-medium text-slate-800">{{ expense.description }}</td><td class="p-4 text-center"><span class="bg-slate-100 text-slate-600 px-3 py-1 rounded-md text-xs font-bold">{{ expense.category }}</span></td><td class="p-4 text-right font-black text-red-600">-${{ expense.amount | number }}</td></tr> }</tbody></table>
  </div>
</div>

@if (isExpenseModalOpen()) { <div class="fixed inset-0 bg-slate-900/40 z-[100] flex items-center justify-center p-4 backdrop-blur-sm"><div class="bg-white rounded-xl shadow-lg w-full max-w-md overflow-hidden border-t-4 border-red-500"><div class="bg-white border-b border-slate-100 px-6 py-5 flex justify-between items-center"><h3 class="text-lg font-bold text-slate-800">Salida de Dinero</h3><button (click)="closeExpenseModal()" class="text-slate-400 hover:text-slate-600 transition-colors"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button></div><div class="p-6 flex flex-col gap-4 bg-slate-50"><div><label class="block text-slate-600 font-medium mb-1 text-sm">Motivo del Gasto</label><input type="text" [value]="expenseDesc()" (input)="updateExpenseDesc($event)" class="w-full bg-white border border-slate-300 rounded-lg p-2.5 text-sm outline-none focus:ring-2 focus:ring-red-500"></div><div><label class="block text-slate-600 font-medium mb-1 text-sm">Categoría</label><select (change)="updateExpenseCategory($event)" class="w-full bg-white border border-slate-300 rounded-lg p-2.5 text-sm outline-none focus:ring-2 focus:ring-red-500"><option value="Insumos">Insumos extras</option><option value="Servicios">Pago de Servicios</option><option value="Nómina">Nómina</option><option value="Otros">Otros</option></select></div><div><label class="block text-slate-600 font-medium mb-1 text-sm">Monto Total ($)</label><input type="number" [value]="expenseAmount()" (input)="updateExpenseAmount($event)" class="w-full bg-white border border-slate-300 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-red-500 text-xl font-bold text-red-500"></div></div><div class="p-5 border-t border-slate-100 bg-white flex gap-3"><button (click)="closeExpenseModal()" class="flex-1 bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-bold py-3 rounded-xl transition-colors shadow-sm text-sm">Cancelar</button><button (click)="saveExpense()" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-black py-2.5 rounded-xl shadow-md transition-colors text-sm">Confirmar Gasto</button></div></div></div> }
