<div class="h-screen w-full bg-slate-50 font-sans flex text-slate-800 overflow-hidden">
  
  @if (isSidebarOpen()) { <div class="fixed inset-0 bg-slate-900/60 z-40 lg:hidden backdrop-blur-sm" (click)="toggleSidebar()"></div> }

  <aside [class]="isSidebarOpen() ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'" class="w-[260px] flex-shrink-0 bg-white border-r border-slate-200 flex flex-col z-50 h-screen fixed lg:relative top-0 left-0 transition-transform duration-300">
    <div class="p-5 border-b border-slate-100 flex items-center justify-between">
      <div class="flex items-center gap-3"><div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold">S</div><h1 class="text-xl font-bold tracking-tight text-slate-900">Selecta</h1></div>
      <button (click)="toggleSidebar()" class="lg:hidden text-slate-400 hover:text-slate-600 p-1 bg-slate-50 rounded-lg"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
    </div>
    <div class="px-5 py-6">
      <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-3">Menú Principal</p>
      <nav class="flex-1 flex flex-col gap-1 overflow-y-auto">
        <a routerLink="/admin/dashboard" routerLinkActive="bg-indigo-50 text-indigo-700 font-medium before:absolute before:left-0 before:top-0 before:bottom-0 before:w-1 before:bg-indigo-600 before:rounded-r" class="flex items-center w-full gap-3 px-4 py-2.5 rounded-lg text-sm relative transition-colors text-slate-600 hover:bg-slate-50 hover:text-slate-900" (click)="closeSidebar()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg> Dashboard</a>
        <a routerLink="/admin/menu" routerLinkActive="bg-indigo-50 text-indigo-700 font-medium before:absolute before:left-0 before:top-0 before:bottom-0 before:w-1 before:bg-indigo-600 before:rounded-r" class="flex items-center w-full gap-3 px-4 py-2.5 rounded-lg text-sm relative transition-colors text-slate-600 hover:bg-slate-50 hover:text-slate-900" (click)="closeSidebar()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line></svg> Menú y Recetas</a>
        <a routerLink="/admin/inventory" routerLinkActive="bg-indigo-50 text-indigo-700 font-medium before:absolute before:left-0 before:top-0 before:bottom-0 before:w-1 before:bg-indigo-600 before:rounded-r" class="flex items-center w-full gap-3 px-4 py-2.5 rounded-lg text-sm relative transition-colors text-slate-600 hover:bg-slate-50 hover:text-slate-900" (click)="closeSidebar()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg> Bodega Física</a>
        <a routerLink="/admin/reports" routerLinkActive="bg-indigo-50 text-indigo-700 font-medium before:absolute before:left-0 before:top-0 before:bottom-0 before:w-1 before:bg-indigo-600 before:rounded-r" class="flex items-center w-full gap-3 px-4 py-2.5 rounded-lg text-sm relative transition-colors text-slate-600 hover:bg-slate-50 hover:text-slate-900" (click)="closeSidebar()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg> Ventas Exitosas</a>
        <a routerLink="/admin/canceled" routerLinkActive="bg-indigo-50 text-indigo-700 font-medium before:absolute before:left-0 before:top-0 before:bottom-0 before:w-1 before:bg-indigo-600 before:rounded-r" class="flex items-center w-full gap-3 px-4 py-2.5 rounded-lg text-sm relative transition-colors text-slate-600 hover:bg-slate-50 hover:text-slate-900" (click)="closeSidebar()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg> Anulaciones</a>
        <a routerLink="/admin/finance" routerLinkActive="bg-indigo-50 text-indigo-700 font-medium before:absolute before:left-0 before:top-0 before:bottom-0 before:w-1 before:bg-indigo-600 before:rounded-r" class="flex items-center w-full gap-3 px-4 py-2.5 rounded-lg text-sm relative transition-colors text-slate-600 hover:bg-slate-50 hover:text-slate-900" (click)="closeSidebar()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg> Finanzas</a>
      </nav>
    </div>
    <div class="px-5 mt-auto pb-6 border-t border-slate-100 pt-5 bg-white">
      <button (click)="onLogout()" class="w-full flex items-center justify-center gap-2 border border-indigo-200 text-indigo-600 hover:bg-indigo-50 hover:text-red-700 hover:border-red-200 rounded-full py-2 font-medium transition-colors text-sm shadow-sm"><span>Cerrar Sesión</span> <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg></button>
    </div>
  </aside>

  <div class="flex-1 flex flex-col h-screen overflow-hidden">
    <header class="flex-shrink-0 bg-white px-4 md:px-8 py-4 border-b border-slate-200 flex justify-between items-center z-10 shadow-sm">
      <div class="flex items-center gap-3">
        <button (click)="toggleSidebar()" class="lg:hidden text-slate-500 hover:text-indigo-600 transition-colors p-1 bg-slate-50 rounded-lg"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
        <h2 class="text-lg md:text-xl font-bold text-slate-800">Panel Administrativo</h2>
      </div>
      <div class="flex items-center gap-3 md:gap-4 shrink-0">
        <div class="hidden sm:flex items-center gap-2 text-sm text-slate-600"><span>Sucursal</span><select class="border border-slate-300 bg-white rounded-full py-1.5 px-3 text-xs md:text-sm font-medium outline-none cursor-pointer"><option>Principal</option></select></div>
        <button class="bg-indigo-600 text-white rounded-full px-3 md:px-4 py-1.5 text-xs md:text-sm font-medium flex items-center gap-1.5 shadow-sm hover:bg-indigo-700 transition-colors"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg> <span class="hidden md:inline">Nuevo Plan</span></button>
        <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 border border-slate-300 ml-1 md:ml-2"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 relative">
      <div class="max-w-[1400px] mx-auto pb-6">
        <router-outlet></router-outlet>
      </div>
    </main>

    <footer class="flex-shrink-0 bg-white border-t border-slate-200 px-4 md:px-8 py-3 flex flex-col sm:flex-row justify-between items-center z-10 gap-2 text-center sm:text-left">
      <p class="text-[10px] md:text-[11px] font-bold text-slate-400 uppercase tracking-widest">© 2026 Selecta SaaS. Todos los derechos reservados.</p>
      <p class="text-[10px] md:text-[11px] font-bold text-slate-400 uppercase tracking-widest">V 1.0.0</p>
    </footer>
  </div>
</div>
