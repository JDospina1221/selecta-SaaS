<!-- ░░ NAVBAR CAJERO ░░ -->
<nav class="bg-white border-b border-slate-200 sticky top-0 z-30">
  <div class="max-w-[1600px] mx-auto px-4 md:px-6 h-16 md:h-20 flex items-center justify-between gap-3">

    <!-- Marca -->
    <div class="flex items-center gap-3 shrink-0">
      <div class="w-9 h-9 md:w-10 md:h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-sm">
        <i class="fas fa-store text-white text-base md:text-lg"></i>
      </div>
      <div class="hidden sm:block">
        <h1 class="text-base md:text-xl font-bold text-slate-900 leading-tight">
          {{ authService.tenantConfig()?.businessInfo?.name || 'Servex' }}
        </h1>
        <p class="text-[10px] font-medium text-slate-500 uppercase tracking-wider">Terminal de Ventas</p>
      </div>
    </div>

    <!-- ░░ Tabs de navegación — scrollables en móvil ░░ -->
    <div class="flex-1 flex justify-center overflow-x-auto scrollbar-hide px-2">
      <div class="flex items-center bg-slate-100 p-1 rounded-xl gap-0.5 shrink-0">

        <a routerLink="/pos/tomar-pedido"
           routerLinkActive="bg-white text-indigo-600 shadow-sm"
           class="px-3 md:px-6 py-2 rounded-lg text-xs md:text-sm font-semibold text-slate-600 transition-all flex items-center gap-1 md:gap-2 whitespace-nowrap">
          <i class="fas fa-plus-circle text-xs md:text-sm"></i>
          <span class="hidden xs:inline">Nuevo Pedido</span>
          <span class="xs:hidden">Pedido</span>
        </a>

        <a routerLink="/pos/ordenes"
           routerLinkActive="bg-white text-indigo-600 shadow-sm"
           class="px-3 md:px-6 py-2 rounded-lg text-xs md:text-sm font-semibold text-slate-600 transition-all flex items-center gap-1 md:gap-2 whitespace-nowrap">
          <i class="fas fa-list-ul text-xs md:text-sm"></i>
          <span class="hidden xs:inline">Gestión de Órdenes</span>
          <span class="xs:hidden">Órdenes</span>
        </a>

        <a routerLink="/pos/inventario"
           routerLinkActive="bg-white text-indigo-600 shadow-sm"
           class="px-3 md:px-6 py-2 rounded-lg text-xs md:text-sm font-semibold text-slate-600 transition-all flex items-center gap-1 md:gap-2 whitespace-nowrap">
          <i class="fas fa-boxes text-xs md:text-sm"></i>
          <span>Inventario</span>
        </a>

      </div>
    </div>

    <!-- Usuario + logout -->
    <div class="flex items-center gap-2 md:gap-4 shrink-0">
      <div class="text-right hidden md:block">
        <p class="text-sm font-bold text-slate-900">{{ authService.currentUser()?.name }}</p>
        <p class="text-xs text-slate-500">{{ authService.currentUser()?.role }}</p>
      </div>
      <div class="h-8 w-[1px] bg-slate-200 hidden md:block"></div>
      <button
        (click)="authService.logout()"
        class="w-9 h-9 md:w-10 md:h-10 rounded-xl bg-rose-50 text-rose-600 hover:bg-rose-100 transition-colors flex items-center justify-center"
        title="Cerrar Sesión">
        <i class="fas fa-sign-out-alt text-sm"></i>
      </button>
    </div>

  </div>
</nav>

<!-- ░░ Modales compartidos ░░ -->
<app-checkout-modal
  [isOpen]="isModalOpen()"
  [total]="total()"
  (closeEvent)="closeModal()"
  (confirmEvent)="confirmCheckout($event)">
</app-checkout-modal>

<app-receipt-modal
  [isOpen]="isReceiptModalOpen()"
  [isLoading]="isReceiptLoading()"
  [ticket]="lastOrderTicket()"
  (closeEvent)="closeReceipt()">
</app-receipt-modal>

<!-- ░░ CONTENIDO DE RUTA ░░ -->
<main class="max-w-[1600px] mx-auto p-3 md:p-6">
  <router-outlet></router-outlet>
</main>
